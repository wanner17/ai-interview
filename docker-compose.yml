version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-interview-backend
    ports:
      - "3001:3001"
    volumes:
      - ./server/google-stt-key.json:/app/google-stt-key.json
    env_file:
      - ./server/.env
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SOCKET_URL=https://api.eisoft.co.kr:543
        - NEXT_PUBLIC_SOCKET_PATH=/interview-api/socket.io
    container_name: ai-interview-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    restart: always